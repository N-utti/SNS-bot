name: CI

# 단일 워크플로 + 영역 path 필터 + 단일 게이트(ci-ok).
# - 백엔드 잡(test·pg)은 frontend/** 만 바뀐 PR 에선 skip, 프론트 잡은 frontend/** 바뀔 때만 run.
#   → 백엔드 PR 은 프론트 빌드를, 프론트 PR 은 백엔드 테스트를 서로 안 기다린다.
# - 브랜치 보호의 required check 는 **ci-ok 하나만** 건다(path 필터 skip 이 머지를 영구 pending 시키지 않게).
# 브랜치 전략: dev=통합 트렁크(작업 PR 타깃), prod=배포(dev→prod 승격 PR), main=동결.
on:
  push:
    branches: [dev, prod]
  pull_request:
    branches: [dev, prod]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: 변경 영역 감지
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - '**'
              - '!frontend/**'
            frontend:
              - 'frontend/**'

  test:
    name: Lint & Test (py${{ matrix.python-version }})
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest, DB 불필요)
        run: pytest

  pg-migration:
    name: PostgreSQL 마이그레이션 적용
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sns
          POSTGRES_PASSWORD: sns
          POSTGRES_DB: sns
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sns -d sns"
          --health-interval 5s --health-timeout 3s --health-retries 12
    env:
      DATABASE_URL: "postgres://sns:sns@localhost:5432/sns"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: aerich 마이그레이션 적용(실 PG)
        run: aerich upgrade

  frontend-build:
    name: 프론트엔드 빌드(타입체크)
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install + build (tsc --noEmit + vite build)
        run: |
          npm ci
          npm run build

  ci-ok:
    name: CI Gate
    # 브랜치 보호에서 required 로 거는 **유일한** 체크.
    needs: [test, pg-migration, frontend-build]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: 관련 잡 결과 집계(skip=통과, failure/cancelled=차단)
        run: |
          for r in "${{ needs.test.result }}" "${{ needs.pg-migration.result }}" "${{ needs.frontend-build.result }}"; do
            echo "result: $r"
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::필수 잡이 실패/취소됨($r)"
              exit 1
            fi
          done
          echo "모든 관련 잡 통과(또는 해당 없음)."
